<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portafolio</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
  <div class="logo">AP</div>
  <nav>
    <a href="index.html">Home</a>
    <a class="active">Portafolio</a>
  </nav>
</header>

<section class="portfolio-page">
  <h1>Portafolio</h1>

  <div class="filters">
    <button class="active" onclick="filterProjects('all')">Todos</button>
    <button onclick="filterProjects('web')">Web</button>
    <button onclick="filterProjects('java')">Java</button>
    <button onclick="filterProjects('qa')">QA</button>
  </div>

  <div class="grid">

    <div class="item web">
      <img src="assets/p1.jpg">
      <div class="hover">
        <h3>Landing Page</h3>
        <span>Desarrollo Web</span>
      </div>
    </div>

    <div class="item java">
      <img src="assets/p2.jpg">
      <div class="hover">
        <h3>Sistema Java</h3>
        <span>Java</span>
      </div>
    </div>

    <div class="item qa">
      <img src="assets/p3.jpg">
      <div class="hover">
        <h3>Testing QA</h3>
        <span>QA</span>
      </div>
    </div>

    <div class="item web">
      <img src="assets/p4.jpg">
      <div class="hover">
        <h3>Portafolio</h3>
        <span>Web</span>
      </div>
    </div>

  </div>
</section>

<script src="script.js"></script>
</body>
</html>
