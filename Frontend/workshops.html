<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Café Gagu - Talleres</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<gagu-navbar active="workshops"></gagu-navbar>

<!-- Workshop Detail Section -->
<section class="workshop-detail-section py-5" id="workshop-detail">
  <div class="container">
    <div class="row g-4 align-items-start">
      <div class="col-lg-7">
        <div class="workshop-detail-card shadow-sm rounded overflow-hidden">
          <img id="detailImage" src="" alt="Detalle del taller" class="img-fluid w-100">
          <div class="p-4">
            <span class="badge bg-warning text-dark mb-3">Taller</span>
            <h2 id="detailTitle" class="fw-bold mb-3"></h2>
            <p id="detailOfferText" class="text-secondary mb-4"></p>
            <div class="d-flex flex-wrap gap-3 mb-3 detail-meta align-items-center">
              <span class="text-muted"><i class="fas fa-clock me-2"></i><strong id="detailDuration"></strong></span>
              <span class="text-muted"><i class="fas fa-calendar-alt me-2"></i><strong id="detailDate"></strong></span>
              <span class="text-success fw-bold fs-5" id="detailPrice"></span>
            </div>
            <div class="detail-experience mt-4">
              <h5 class="fw-bold mb-3">Experiencia</h5>
              <ul id="detailExperience" class="list-unstyled mb-0"></ul>
            </div>
          </div>
        </div>

        <div class="workshop-related mt-4">
          <h4 class="fw-bold mb-3">También te puede interesar</h4>
          <div class="row g-3" id="workshopOptions"></div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="ticket-panel rounded shadow-sm p-4">
          <div class="ticket-header mb-4">
            <div>
              <span class="text-uppercase fw-bold text-muted">Hora</span>
              <div id="detailTime" class="h5 fw-bold">--</div>
            </div>
            <div class="text-end">
              <h3 id="ticketTitle" class="h5 fw-bold mb-1">Taller</h3>
              <span id="ticketPrice" class="h4 text-success fw-bold"></span>
            </div>
          </div>

          <div class="ticket-box p-4 rounded mb-4">
            <h5 class="fw-bold mb-3">Información de ticket</h5>
            <div class="row g-3">
              <div class="col-6">
                <label for="ticketName" class="form-label small fw-bold">Nombre</label>
                <input type="text" class="form-control form-control-sm" id="ticketName" placeholder="Ingresa tu nombre">
              </div>
              <div class="col-6">
                <label for="ticketPhone" class="form-label small fw-bold">Teléfono</label>
                <input type="tel" class="form-control form-control-sm" id="ticketPhone" placeholder="Ingresa tu teléfono">
              </div>
              <div class="col-6">
                <label for="ticketDocument" class="form-label small fw-bold">Cédula</label>
                <input type="text" class="form-control form-control-sm" id="ticketDocument" placeholder="Número de documento">
              </div>
              <div class="col-6">
                <label for="ticketDate" class="form-label small fw-bold">Fecha del taller</label>
                <input type="date" class="form-control form-control-sm" id="ticketDate">
              </div>
            </div>
          </div>

          <div class="d-flex gap-2 align-items-center mb-3 quantity-controller">
            <button id="decreaseQty" type="button" class="btn btn-outline-dark btn-sm">-</button>
            <span id="ticketQuantity" class="quantity-value">1</span>
            <button id="increaseQty" type="button" class="btn btn-outline-dark btn-sm">+</button>
          </div>

          <button id="addToCartBtn" type="button" class="btn btn-outline-dark w-100 mb-3">
            <i class="fas fa-shopping-cart me-2"></i>Agregar al carrito
          </button>
          <button id="buyNowBtn" type="button" class="btn btn-dark w-100">
            Comprar ahora
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

<gagu-footer></gagu-footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/cart.js"></script>
<script src="js/workshops.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
</body>
</html>
