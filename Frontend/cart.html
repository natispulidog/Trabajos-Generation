<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Café Gagu - Carrito</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<gagu-navbar active="cart"></gagu-navbar>

<div class="container mt-5">
  <div class="text-center mb-5">
    <h2 class="display-4 fw-bold text-primary">
      <i class="fas fa-shopping-cart me-3"></i>Carrito de Compras
    </h2>
    <p class="lead text-muted">Revisa y gestiona tus productos seleccionados</p>
  </div>

  <div class="card shadow-lg">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead class="table-light">
            <tr>
              <th>Producto</th>
              <th>Precio</th>
              <th>Cantidad</th>
              <th>Subtotal</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="cartBody"></tbody>
        </table>
      </div>

      <div class="text-end mt-4">
        <h3 class="text-primary fw-bold">
          Total: $<span id="total">0</span>
        </h3>
        <button class="btn btn-success btn-lg mt-3" onclick="checkout()">
          <i class="fas fa-credit-card me-2"></i>Proceder al Pago
        </button>
      </div>
    </div>
  </div>
</div>

<gagu-footer></gagu-footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/cart.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script>
  renderCart();
</script>
</body>
</html>
