<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Café Gagu - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<gagu-navbar active="admin"></gagu-navbar>

<div class="container mt-5">
  <div class="text-center mb-5">
    <h2 class="display-4 fw-bold text-primary">
      <i class="fas fa-cog me-3"></i>Panel de Administración
    </h2>
    <p class="lead text-muted">Gestiona los productos de la tienda</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-lg">
        <div class="card-header" style="background-color: var(--primary-color); color: white;">
          <h5 class="mb-0">
            <i class="fas fa-plus-circle me-2"></i>Crear Nuevo Producto
          </h5>
        </div>
        <div class="card-body">
          <form id="createForm">
            <div class="mb-3">
              <label for="nombre" class="form-label fw-bold">
                <i class="fas fa-tag me-2"></i>Nombre del Producto
              </label>
              <input type="text" id="nombre" class="form-control" placeholder="Ej: Café Colombiano Premium" required>
            </div>
            <div class="mb-3">
              <label for="precio" class="form-label fw-bold">
                <i class="fas fa-dollar-sign me-2"></i>Precio
              </label>
              <input type="number" id="precio" class="form-control" placeholder="Ej: 25.99" step="0.01" required>
            </div>
            <div class="mb-3">
              <label for="imagen" class="form-label fw-bold">
                <i class="fas fa-image me-2"></i>URL de Imagen
              </label>
              <input type="url" id="imagen" class="form-control" placeholder="https://ejemplo.com/imagen.jpg" required>
            </div>
            <button type="submit" class="btn btn-success w-100">
              <i class="fas fa-save me-2"></i>Crear Producto
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-5">
    <h3 class="text-center mb-4">
      <i class="fas fa-list me-2"></i>Productos Existentes
    </h3>
    <div class="row" id="lista">
      <!-- Productos se cargarán aquí -->
    </div>
  </div>
</div>

<gagu-footer></gagu-footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
</body>
</html>
