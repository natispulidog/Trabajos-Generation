<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Café Gagu - Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="auth-body">

<div class="login-wrapper">
  <div class="brand-box">
    <div class="brand-content">
      <i class="fas fa-coffee fa-2x mb-2"></i>
      <h1 class="h3 fw-bold mb-0">Café Gagu</h1>
    </div>
  </div>

  <div class="auth-container">
    <h2>Registro</h2>

    <form onsubmit="register(event)">
      <div class="mb-3">
        <input type="email" id="email" class="form-control auth-input" placeholder="Correo electrónico" required>
      </div>
      <div class="mb-3">
        <input type="password" id="password" class="form-control auth-input" placeholder="Contraseña" required>
      </div>
      <button type="submit" class="btn btn-auth w-100">Registrarse</button>
    </form>

    <p class="text-center mt-3 small text-muted">¿Ya tienes cuenta? 
      <a href="login.html" class="fw-bold text-decoration-none" style="color: #8B4513;">Inicia sesión</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
