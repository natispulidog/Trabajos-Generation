<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Rosa Nata</title>
    <style>
        :root {
            --primary: #4CAF50;
            --danger: #ff4d6d;
            --pink-goal: #ff006e; /* Rosa intenso para el nivel 10 */
            --bg-grad: linear-gradient(135deg, #ffe5ec, #fb6f92);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            text-align: center;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-grad);
        }

        .container {
            background: rgba(255, 255, 255, 0.8);
            padding: 3rem;
            border-radius: 35px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(255, 77, 109, 0.2);
            border: 2px solid #fff;
            width: 320px;
        }

        h1 { color: #590d22; margin-bottom: 0.5rem; }

        #counter {
            font-size: 7.5rem;
            font-weight: 900;
            padding: 20px;
            margin: 20px auto;
            border-radius: 30px;
            background-color: #ffffff;
            color: #333;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* --- CAMBIO A ROSA AL LLEGAR A 10 --- */
        #counter.reached-10 {
            background-color: var(--pink-goal);
            color: white;
            transform: scale(1.08);
            box-shadow: 0 15px 35px rgba(255, 0, 110, 0.4);
        }

        .btn-group { 
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            padding: 15px 25px;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            border-radius: 18px;
            font-weight: bold;
            transition: 0.2s;
            color: white;
            flex: 1 1 40%;
        }

        .btn:active { transform: scale(0.92); }
        #increment { background-color: var(--primary); }
        #decrement { background-color: var(--danger); }
        #reset { background-color: #555; flex: 1 1 90%; }

        .btn:disabled { 
            background-color: #e0e0e0 !important; 
            color: #aaa;
            cursor: not-allowed; 
        }

        .hint { color: #800f2f; margin-top: 15px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contador 🔊</h1>
        <div id="counter">0</div>

        <div class="btn-group">
            <button id="decrement" class="btn">− Menos</button>
            <button id="increment" class="btn">+ Más</button>
            <button id="reset" class="btn">Resetear</button>
        </div>
        
        <p class="hint">¡A los 10 se vuelve rosa! ✨</p>
    </div>

    <script>
        const MAX = 20;
        let count = parseInt(localStorage.getItem("count")) || 0;

        const counterEl = document.getElementById("counter");
        const btnInc = document.getElementById("increment");
        const btnDec = document.getElementById("decrement");
        const btnRes = document.getElementById("reset");

        // Sonido Sintético (No necesita archivos mp3)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playStepSound(isUp) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Frecuencia: 600Hz para subir, 300Hz para bajar
            osc.frequency.setValueAtTime(isUp ? 600 : 300, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function updateUI() {
            counterEl.textContent = count;
            localStorage.setItem("count", count);

            // Lógica de color Rosa al llegar a 10
            if (count >= 10) {
                counterEl.classList.add('reached-10');
            } else {
                counterEl.classList.remove('reached-10');
            }

            // Estado de botones
            btnDec.disabled = (count <= 0);
            btnInc.disabled = (count >= MAX);

            // Animación de pulso
            counterEl.animate([
                { transform: 'scale(1)' },
                { transform: 'scale(1.1)' },
                { transform: 'scale(1)' }
            ], { duration: 100 });
        }

        btnInc.onclick = () => {
            if (count < MAX) {
                count++;
                playStepSound(true);
                updateUI();
            }
        };

        btnDec.onclick = () => {
            if (count > 0) {
                count--;
                playStepSound(false);
                updateUI();
            }
        };

        btnRes.onclick = () => {
            count = 0;
            updateUI();
        };

        // Teclado
        document.onkeydown = (e) => {
            if (e.key === "ArrowUp") btnInc.click();
            if (e.key === "ArrowDown") btnDec.click();
        };

        // Inicializar al cargar
        updateUI();
    </script>
</body>
</html>
