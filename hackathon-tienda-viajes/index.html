<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViajaYA | Tienda de Viajes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="bg-primary text-white text-center py-5 shadow">
        <h1 class="display-4 fw-bold">ViajaYA ✈️</h1>
        <p class="lead">Explora destinos y vive aventuras inolvidables</p>
    </header>

    <main class="container my-5">
        <h2 class="text-center mb-4">Destinos disponibles</h2>
        <div id="product-grid" class="row row-cols-1 row-cols-md-3 g-4"></div>

        <hr class="my-5">

        <section id="carrito-section" class="mb-5">
            <h2 class="text-center mb-4">🛒 Tu Carrito de Compras</h2>
            <div class="card p-4 shadow-sm">
                <ul id="cart-items" class="list-group list-group-flush mb-3">
                    </ul>
                <div class="text-end border-top pt-3">
                    <h4 class="fw-bold">Total a pagar: $<span id="cart-total">0</span></h4>
                    <button class="btn btn-success mt-2 px-4">Confirmar Reserva</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-dark text-white text-center py-4">
        <p class="mb-0">Hackathon 1 - Generation Colombia | 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
